<!DOCTYPE html>
<html>
<head>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 340px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      padding: 20px;
    }

    h1 {
      font-size: 15px;
      font-weight: 600;
      color: #a8b4ff;
      margin-bottom: 4px;
      letter-spacing: 0.02em;
    }

    .subtitle {
      font-size: 11px;
      color: #6b7280;
      margin-bottom: 16px;
    }

    .status-card {
      background: #16213e;
      border: 1px solid #2a3a5c;
      border-radius: 8px;
      padding: 14px;
      margin-bottom: 14px;
    }

    .status-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
      line-height: 1.8;
    }

    .status-label { color: #8892a8; }

    .status-value {
      font-weight: 600;
      font-variant-numeric: tabular-nums;
    }

    .status-value.active { color: #34d399; }
    .status-value.idle { color: #6b7280; }
    .status-value.stopped { color: #f87171; }
    .status-value.complete { color: #34d399; }

    .btn-row {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
    }

    button {
      flex: 1;
      padding: 9px 0;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
      letter-spacing: 0.01em;
    }

    button:hover { opacity: 0.85; }
    button:active { transform: scale(0.98); }
    button:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

    .btn-start { background: #34d399; color: #064e3b; }
    .btn-stop { background: #f87171; color: #7f1d1d; }
    .btn-download { background: #a8b4ff; color: #1a1a2e; }
    .btn-save { background: #34d399; color: #064e3b; }
    .btn-reset { background: #374151; color: #9ca3af; font-weight: 500; }
    .btn-goto { background: #facc15; color: #422006; }

    .goto-row {
      margin-bottom: 8px;
      display: none;
    }

    .section-label {
      font-size: 11px;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 6px;
      margin-top: 14px;
    }

    .speed-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }

    .speed-row input[type="range"] {
      flex: 1;
      accent-color: #a8b4ff;
      height: 4px;
    }

    .speed-label {
      font-size: 12px;
      color: #a8b4ff;
      font-weight: 600;
      min-width: 32px;
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    .mode-row {
      display: flex;
      gap: 6px;
      margin-bottom: 14px;
    }

    .mode-btn {
      flex: 1;
      padding: 7px 0;
      border: 1px solid #2a3a5c;
      border-radius: 6px;
      background: #16213e;
      color: #8892a8;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }

    .mode-btn.active {
      border-color: #a8b4ff;
      background: #1e2a4a;
      color: #a8b4ff;
    }

    .mode-btn:hover { opacity: 0.85; }

    .filename-input {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #2a3a5c;
      border-radius: 6px;
      background: #16213e;
      color: #e0e0e0;
      font-size: 12px;
      font-family: "SF Mono", "Cascadia Code", "Consolas", monospace;
      margin-bottom: 8px;
      outline: none;
    }

    .filename-input:focus {
      border-color: #a8b4ff;
    }

    .start-prompt {
      background: #16213e;
      border: 1px solid #2a3a5c;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 14px;
      font-size: 12px;
      line-height: 1.5;
      display: none;
    }

    .start-prompt .prompt-text {
      color: #d1d5db;
      margin-bottom: 10px;
    }

    .start-prompt .prompt-btns {
      display: flex;
      gap: 8px;
    }

    .start-prompt button {
      font-size: 12px;
      padding: 6px 0;
    }

    .note {
      font-size: 11px;
      color: #4b5563;
      line-height: 1.5;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <h1>Chapter Collector</h1>
  <p class="subtitle">Detected: <span id="siteLabel">—</span></p>

  <div class="status-card">
    <div class="status-row">
      <span class="status-label">Book</span>
      <span class="status-value" id="bookName" style="color:#d1d5db; font-weight:400; max-width:200px; text-align:right; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">—</span>
    </div>
    <div class="status-row">
      <span class="status-label">Status</span>
      <span class="status-value" id="statusText">—</span>
    </div>
    <div class="status-row">
      <span class="status-label">Chapters</span>
      <span class="status-value" id="chapterCount">0</span>
    </div>
    <div class="status-row">
      <span class="status-label">Current</span>
      <span class="status-value" id="currentChapter" style="color:#d1d5db; font-weight:400; max-width:200px; text-align:right; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">—</span>
    </div>
  </div>

  <div id="startPrompt" class="start-prompt">
    <div class="prompt-text" id="promptText"></div>
    <div class="prompt-btns">
      <button class="btn-start" id="btnYes">Yes, Ch 1</button>
      <button class="btn-stop" id="btnNo" style="background:#374151;color:#d1d5db;">No, start here</button>
    </div>
  </div>

  <div class="goto-row" id="gotoRow">
    <button class="btn-goto" id="btnGotoCh1" style="width:100%;">&#8592; Go to Chapter 1</button>
  </div>

  <div class="btn-row">
    <button class="btn-start" id="btnStart">&#9654; Start</button>
    <button class="btn-stop" id="btnStop">&#9632; Stop</button>
  </div>

  <p class="section-label">Speed</p>
  <div class="speed-row">
    <input type="range" id="speedSlider" min="1" max="10" step="0.5" value="2.5">
    <span class="speed-label" id="speedLabel">2.5s</span>
  </div>

  <p class="section-label">Download Mode</p>
  <div class="mode-row">
    <button class="mode-btn active" id="modeBulk">All in one file</button>
    <button class="mode-btn" id="modePerChapter">Per chapter</button>
  </div>

  <p class="section-label">Download</p>
  <input type="text" class="filename-input" id="filenameInput" placeholder="filename.txt" spellcheck="false">
  <div class="btn-row" id="downloadRow">
    <button class="btn-download" id="btnSaveAs">&#8595; Save As...</button>
    <button class="btn-save" id="btnSave" style="display:none;">&#8595; Save</button>
    <button class="btn-reset" id="btnReset">Reset</button>
  </div>

  <p class="note">
    Navigate to a chapter page, click Start, and watch it go.
    Progress is saved in localStorage.
  </p>

  <script src="popup.js"></script>
</body>
</html>
